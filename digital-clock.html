<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Digital Clock - Multiple Time Zones</title>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'Courier New', monospace;
  background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 20px;
}

.container {
  width: 100%;
  max-width: 1200px;
}

.header {
  text-align: center;
  color: #fff;
  margin-bottom: 40px;
}

.header h1 {
  font-size: 2.5rem;
  margin-bottom: 10px;
  text-shadow: 0 2px 10px rgba(0,0,0,0.3);
}

.header p {
  font-size: 1rem;
  opacity: 0.9;
}

.clocks-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 20px;
  margin-bottom: 30px;
}

.clock-card {
  background: rgba(255, 255, 255, 0.1);
  backdrop-filter: blur(10px);
  border-radius: 20px;
  padding: 30px;
  border: 1px solid rgba(255, 255, 255, 0.2);
  box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
  transition: all 0.3s ease;
  cursor: pointer;
}

.clock-card:hover {
  background: rgba(255, 255, 255, 0.15);
  transform: translateY(-5px);
  box-shadow: 0 12px 40px rgba(0, 0, 0, 0.3);
}

.clock-card.active {
  background: rgba(255, 255, 255, 0.2);
  border-color: rgba(255, 255, 255, 0.5);
}

.timezone-name {
  font-size: 0.9rem;
  color: #b0d4ff;
  text-transform: uppercase;
  letter-spacing: 2px;
  margin-bottom: 8px;
  font-weight: 600;
}

.timezone-location {
  font-size: 1.1rem;
  color: #fff;
  margin-bottom: 15px;
  font-weight: 500;
}

.digital-time {
  font-size: 2.5rem;
  color: #00ff88;
  font-weight: bold;
  text-shadow: 0 0 10px rgba(0, 255, 136, 0.5);
  margin-bottom: 10px;
  font-family: 'Courier New', monospace;
  letter-spacing: 2px;
}

.date-display {
  font-size: 0.9rem;
  color: #a0c4ff;
  margin-top: 10px;
}

.period {
  font-size: 0.85rem;
  color: #80b0ff;
  margin-top: 5px;
  font-weight: 600;
}

.controls {
  display: flex;
  gap: 10px;
  justify-content: center;
  flex-wrap: wrap;
  margin-bottom: 30px;
}

.btn {
  background: rgba(255, 255, 255, 0.2);
  color: #fff;
  border: 1px solid rgba(255, 255, 255, 0.3);
  padding: 10px 20px;
  border-radius: 25px;
  cursor: pointer;
  font-size: 0.9rem;
  transition: all 0.3s ease;
  font-weight: 600;
  letter-spacing: 1px;
}

.btn:hover {
  background: rgba(255, 255, 255, 0.3);
  border-color: rgba(255, 255, 255, 0.5);
}

.btn.active {
  background: rgba(0, 255, 136, 0.3);
  border-color: #00ff88;
  color: #00ff88;
}

.format-toggle {
  display: flex;
  gap: 5px;
  background: rgba(255, 255, 255, 0.1);
  padding: 5px;
  border-radius: 20px;
  border: 1px solid rgba(255, 255, 255, 0.2);
}

.format-btn {
  padding: 8px 16px;
  background: transparent;
  color: #fff;
  border: none;
  border-radius: 15px;
  cursor: pointer;
  font-size: 0.85rem;
  font-weight: 600;
  transition: all 0.3s ease;
}

.format-btn.active {
  background: rgba(255, 255, 255, 0.3);
  color: #00ff88;
}

.footer {
  text-align: center;
  color: #a0c4ff;
  font-size: 0.9rem;
  margin-top: 30px;
}

.footer span {
  display: inline-block;
  margin: 0 10px;
}

.analog-clock {
  width: 150px;
  height: 150px;
  border-radius: 50%;
  background: rgba(0, 0, 0, 0.3);
  border: 3px solid rgba(255, 255, 255, 0.3);
  position: relative;
  margin: 10px auto;
}

.clock-center {
  width: 8px;
  height: 8px;
  background: #00ff88;
  border-radius: 50%;
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  z-index: 10;
}

.hand {
  position: absolute;
  bottom: 50%;
  left: 50%;
  transform-origin: bottom center;
  border-radius: 10px;
}

.hour-hand {
  width: 4px;
  height: 35px;
  background: #fff;
  margin-left: -2px;
}

.minute-hand {
  width: 3px;
  height: 45px;
  background: #00ff88;
  margin-left: -1.5px;
}

.second-hand {
  width: 1px;
  height: 50px;
  background: #ff6b6b;
  margin-left: -0.5px;
}

.clock-number {
  position: absolute;
  width: 100%;
  height: 100%;
  text-align: center;
  font-size: 0.75rem;
  color: #a0c4ff;
  font-weight: bold;
}

.clock-number span {
  display: inline-block;
  position: absolute;
  width: 100%;
  height: 100%;
  text-align: center;
}

@media (max-width: 768px) {
  .header h1 {
    font-size: 1.8rem;
  }
  
  .clocks-grid {
    grid-template-columns: 1fr;
  }
  
  .digital-time {
    font-size: 2rem;
  }
}

.add-timezone-section {
  background: rgba(255, 255, 255, 0.1);
  border-radius: 20px;
  padding: 20px;
  margin-bottom: 20px;
  border: 1px solid rgba(255, 255, 255, 0.2);
}

.add-timezone-section h3 {
  color: #fff;
  margin-bottom: 15px;
  font-size: 1.1rem;
}

.timezone-input-group {
  display: flex;
  gap: 10px;
  margin-bottom: 10px;
}

.timezone-input-group input,
.timezone-input-group select {
  flex: 1;
  padding: 10px;
  border-radius: 8px;
  border: 1px solid rgba(255, 255, 255, 0.3);
  background: rgba(255, 255, 255, 0.1);
  color: #fff;
  font-family: 'Courier New', monospace;
}

.timezone-input-group input::placeholder {
  color: rgba(255, 255, 255, 0.5);
}

.timezone-input-group input:focus,
.timezone-input-group select:focus {
  outline: none;
  border-color: #00ff88;
  background: rgba(255, 255, 255, 0.15);
}

.timezone-input-group select option {
  background: #1e3c72;
  color: #fff;
}
</style>
</head>
<body>

<div class="container">
  <div class="header">
    <h1>⏰ Global Time Zone Clock</h1>
    <p>Track time across multiple time zones in real-time</p>
  </div>

  <div class="controls">
    <div class="format-toggle">
      <button class="format-btn active" onclick="toggleFormat(true)">24-Hour</button>
      <button class="format-btn" onclick="toggleFormat(false)">12-Hour</button>
    </div>
    <button class="btn" onclick="resetToDefault()">🔄 Reset</button>
    <button class="btn" onclick="toggleAnalog()">📊 Toggle Analog</button>
  </div>

  <div class="add-timezone-section">
    <h3>➕ Add Custom Time Zone</h3>
    <div class="timezone-input-group">
      <input type="text" id="tzName" placeholder="City/Name (e.g., Tokyo, New York)" />
      <select id="tzOffset">
        <option value="">Select UTC Offset...</option>
        <option value="-12">UTC-12 (Baker Island)</option>
        <option value="-11">UTC-11 (American Samoa)</option>
        <option value="-10">UTC-10 (Hawaii)</option>
        <option value="-9">UTC-9 (Alaska)</option>
        <option value="-8">UTC-8 (Pacific)</option>
        <option value="-7">UTC-7 (Mountain)</option>
        <option value="-6">UTC-6 (Central)</option>
        <option value="-5">UTC-5 (Eastern)</option>
        <option value="-4">UTC-4 (Atlantic)</option>
        <option value="-3.5">UTC-3:30 (Newfoundland)</option>
        <option value="-3">UTC-3 (Brazil)</option>
        <option value="-2">UTC-2 (Mid-Atlantic)</option>
        <option value="-1">UTC-1 (Azores)</option>
        <option value="0">UTC±0 (London/GMT)</option>
        <option value="1">UTC+1 (Central Europe)</option>
        <option value="2">UTC+2 (Eastern Europe)</option>
        <option value="3">UTC+3 (Moscow)</option>
        <option value="3.5">UTC+3:30 (Iran)</option>
        <option value="4">UTC+4 (Dubai)</option>
        <option value="4.5">UTC+4:30 (Afghanistan)</option>
        <option value="5">UTC+5 (Pakistan)</option>
        <option value="5.5">UTC+5:30 (India)</option>
        <option value="5.75">UTC+5:45 (Nepal)</option>
        <option value="6">UTC+6 (Bangladesh)</option>
        <option value="7">UTC+7 (Thailand)</option>
        <option value="8">UTC+8 (Singapore/China)</option>
        <option value="9">UTC+9 (Tokyo)</option>
        <option value="9.5">UTC+9:30 (Australia)</option>
        <option value="10">UTC+10 (Sydney)</option>
        <option value="11">UTC+11 (Solomon Islands)</option>
        <option value="12">UTC+12 (New Zealand)</option>
      </select>
      <button class="btn" onclick="addCustomTimezone()" style="min-width: 100px;">Add</button>
    </div>
  </div>

  <div class="clocks-grid" id="clocksGrid"></div>

  <div class="footer">
    <span>🌍 World Clock</span>
    <span>•</span>
    <span id="updateStatus">Live Updates</span>
  </div>
</div>

<script>
let use24Hour = true;
let showAnalog = false;
let customTimezones = [];

// Default timezones
const defaultTimezones = [
  { name: 'UTC', offset: 0, location: 'Coordinated Universal Time' },
  { name: 'EST', offset: -5, location: 'New York, USA' },
  { name: 'CST', offset: -6, location: 'Chicago, USA' },
  { name: 'MST', offset: -7, location: 'Denver, USA' },
  { name: 'PST', offset: -8, location: 'Los Angeles, USA' },
  { name: 'GMT', offset: 0, location: 'London, UK' },
  { name: 'CET', offset: 1, location: 'Paris, France' },
  { name: 'EET', offset: 2, location: 'Cairo, Egypt' },
  { name: 'MSK', offset: 3, location: 'Moscow, Russia' },
  { name: 'IST', offset: 5.5, location: 'New Delhi, India' },
  { name: 'SGT', offset: 8, location: 'Singapore' },
  { name: 'JST', offset: 9, location: 'Tokyo, Japan' },
  { name: 'AEST', offset: 10, location: 'Sydney, Australia' },
  { name: 'SAST', offset: 2, location: 'Johannesburg, South Africa' },
];

let timezones = [...defaultTimezones];

function getTimeForTimezone(offset) {
  const now = new Date();
  const utcTime = new Date(now.getTime() + now.getTimezoneOffset() * 60000);
  const tzTime = new Date(utcTime.getTime() + offset * 3600000);
  return tzTime;
}

function formatTime(date, use24 = true) {
  let hours = date.getHours();
  let minutes = date.getMinutes();
  let seconds = date.getSeconds();
  let period = '';

  if (!use24) {
    period = hours >= 12 ? 'PM' : 'AM';
    hours = hours % 12 || 12;
  }

  const pad = (n) => String(n).padStart(2, '0');
  return {
    time: `${pad(hours)}:${pad(minutes)}:${pad(seconds)}`,
    period: period
  };
}

function createClockCard(tz) {
  const tzTime = getTimeForTimezone(tz.offset);
  const formatted = formatTime(tzTime, use24Hour);
  
  const date = tzTime.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
  
  let html = `
    <div class="clock-card" onclick="toggleActive(this)">
      <div class="timezone-name">${tz.name}</div>
      <div class="timezone-location">${tz.location}</div>
  `;

  if (showAnalog) {
    html += `
      <div class="analog-clock" id="analog-${tz.name}">
        <div class="clock-center"></div>
        <div class="hand hour-hand" style="transform: rotate(${(tzTime.getHours() % 12) * 30 + tzTime.getMinutes() * 0.5}deg);"></div>
        <div class="hand minute-hand" style="transform: rotate(${tzTime.getMinutes() * 6 + tzTime.getSeconds() * 0.1}deg);"></div>
        <div class="hand second-hand" style="transform: rotate(${tzTime.getSeconds() * 6}deg);"></div>
      </div>
    `;
  }

  html += `
      <div class="digital-time">${formatted.time}</div>
      ${formatted.period ? `<div class="period">${formatted.period}</div>` : ''}
      <div class="date-display">${date}</div>
  `;

  if (customTimezones.includes(tz)) {
    html += `<button class="btn" style="width: 100%; margin-top: 15px; background: rgba(255, 107, 107, 0.3); border-color: #ff6b6b;" onclick="removeTimezone('${tz.location}', event)">Remove</button>`;
  }

  html += `</div>`;
  return html;
}

function updateClocks() {
  const grid = document.getElementById('clocksGrid');
  grid.innerHTML = timezones.map(tz => createClockCard(tz)).join('');
  updateAnalogClocks();
}

function updateAnalogClocks() {
  if (!showAnalog) return;
  
  timezones.forEach(tz => {
    const tzTime = getTimeForTimezone(tz.offset);
    const analogClock = document.getElementById(`analog-${tz.name}`);
    
    if (analogClock) {
      const hourHand = analogClock.querySelector('.hour-hand');
      const minuteHand = analogClock.querySelector('.minute-hand');
      const secondHand = analogClock.querySelector('.second-hand');
      
      hourHand.style.transform = `rotate(${(tzTime.getHours() % 12) * 30 + tzTime.getMinutes() * 0.5}deg)`;
      minuteHand.style.transform = `rotate(${tzTime.getMinutes() * 6 + tzTime.getSeconds() * 0.1}deg)`;
      secondHand.style.transform = `rotate(${tzTime.getSeconds() * 6}deg)`;
    }
  });
}

function toggleFormat(is24) {
  use24Hour = is24;
  document.querySelectorAll('.format-btn').forEach((btn, idx) => {
    btn.classList.toggle('active', (idx === 0 && is24) || (idx === 1 && !is24));
  });
  updateClocks();
}

function toggleAnalog() {
  showAnalog = !showAnalog;
  updateClocks();
}

function toggleActive(card) {
  document.querySelectorAll('.clock-card').forEach(c => c.classList.remove('active'));
  card.classList.add('active');
}

function addCustomTimezone() {
  const name = document.getElementById('tzName').value.trim();
  const offset = parseFloat(document.getElementById('tzOffset').value);
  
  if (!name || isNaN(offset)) {
    alert('Please fill in all fields');
    return;
  }
  
  const newTz = { name: name.toUpperCase(), offset, location: name };
  timezones.push(newTz);
  customTimezones.push(newTz);
  
  document.getElementById('tzName').value = '';
  document.getElementById('tzOffset').value = '';
  
  updateClocks();
}

function removeTimezone(location, event) {
  event.stopPropagation();
  timezones = timezones.filter(tz => tz.location !== location);
  customTimezones = customTimezones.filter(tz => tz.location !== location);
  updateClocks();
}

function resetToDefault() {
  timezones = [...defaultTimezones];
  customTimezones = [];
  updateClocks();
}

// Update every second
setInterval(updateClocks, 1000);

// Initial load
updateClocks();
</script>

</body>
</html>
